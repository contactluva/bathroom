<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nhập liệu – Quang Minh</title>
<style>
:root{
  --bg:#f2f2f7;
  --card:#ffffff;
  --primary:#007aff;
  --radius:12px;
  --shadow:0 2px 12px rgba(0,0,0,.06);
}
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif}
body{margin:0;background:var(--bg);font-size:16px;color:#000}
.container{max-width:600px;margin:auto;padding:16px}
h3{margin:0 0 16px;font-weight:600;font-size:20px}

.inp{
  width:100%;border:none;outline:none;padding:8px 16px;
  background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow);font-size:15px;
}
.row{margin-bottom:12px}
.row input,.row textarea{resize:none}
.row textarea{height:80px}

.proItem{
  background:#ffffff;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:16px;margin-bottom:16px;
}

.dual{
  display:flex;justify-content:space-between;
}
.dual>div{width:48%}
.dual label{font-weight:600;font-size:14px;margin-bottom:4px;display:block}

.upload-btn{
  width:26px;height:26px;border-radius:50%;
  background:var(--primary);color:#fff;
  display:inline-flex;align-items:center;justify-content:center;
  margin-left:8px;font-size:20px;cursor:pointer;
}
input[type=file]{display:none}

/* ---------- BUTTONS ---------- */
.btn{
  padding:12px 20px;border:none;border-radius:var(--radius);
  font-size:16px;font-weight:500;color:#fff;cursor:pointer;
}
#addBtn{background:var(--primary);}

/* Hàng nút phụ Delete – Save – Restore */
.secondary-btns{
  display:flex;gap:10px;margin-top:36px;
}
.secondary-btns .btn {
  flex: 1; 
  padding: 12px 5px; 
}
.btn-delete{ background:#0016; padding: 6px; font-size: 12px; }
.btn-save{ background:#ff9500; padding: 6px; font-size: 12px; }
.btn-restore{ background:#af52de; padding: 6px; font-size: 12px; }

#okBtn{ background:#34c759;width:100%;margin-top:16px; }

/* Thông báo nhỏ */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:#333;color:#fff;padding:10px 24px;border-radius:30px;
  font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;
}
.toast.show{opacity:1}
#restoreMsg{ text-align:center;font-size:13px;color:#888;margin-top:4px; }
</style>
</head>
<body>
<div class="container">
  <h3>Nhập thông tin</h3>

  <div class="row dual" style="align-items: center; justify-content: flex-start; gap: 15px;">
    <div style="width:auto; display:flex; align-items:center; gap:8px;">
      <input type="checkbox" id="fAutoDate" style="width:18px;height:18px;" onchange="toggleDate()">
      <label for="fAutoDate" style="margin:0;">Lấy ngày hiện tại</label>
    </div>
    <div style="flex:1;">
      <input id="fDateStr" class="inp" value=".... / .... / 2026" style="text-align:center; color: #d9534f; font-weight: bold;">
    </div>
  </div>

  <div class="row"><input id="fCompany" class="inp" placeholder="Tên công ty"></div>
  <div class="row"><input id="fAddress" class="inp" placeholder="Địa chỉ"></div>
  <div class="row"><input id="fTax" class="inp" placeholder="Mã số thuế"></div>

  <div id="proList">
    <div class="proItem">
      <div class="row"><input class="pName inp" placeholder="Tên sản phẩm"></div>
      <div class="row"><textarea class="pInfo inp" rows="3">• Giới hạn cân:
• Bước nhảy: d=
• Bảo hành 1 năm</textarea></div>
      <div class="row">
        <input type="text" class="pImg inp" placeholder="Link ảnh">
        <label class="upload-btn" onclick="this.nextElementSibling.click()">+</label>
        <input type="file" accept="image/*" onchange="uploadImg(this)">
      </div>
      <div class="dual">
        <div>
          <label>Số lượng</label>
          <input type="number" class="pQty inp" value="1">
        </div>
        <div>
          <label>Đơn giá</label>
          <input type="text" class="pPrice inp" placeholder="đ" oninput="formatPriceModal(this)">
        </div>
      </div>
    </div>
  </div>

  <button id="addBtn" class="btn" onclick="addPro()">+ Thêm SP</button>
  <button id="okBtn" class="btn" onclick="saveAndGo()">Hoàn tất</button>
  <br>
  <div class="secondary-btns">
    <button class="btn btn-delete" onclick="deleteState()">🗑️ Xóa</button>
    <button class="btn btn-save" onclick="saveState()">💾 Save</button>
    <button class="btn btn-restore" onclick="restoreState()">🔄 Restore</button>
  </div>
  <div id="restoreMsg"></div>

</div>

<div id="toast" class="toast"></div>

<script>
/* ---------- Quản lý Ngày Tháng ---------- */
function getToday(){
  const d=new Date(), dd=String(d.getDate()).padStart(2,'0'), mm=String(d.getMonth()+1).padStart(2,'0'), y=d.getFullYear();
  return `${dd}/${mm}/${y}`;
}

function toggleDate(){
  const chk = document.getElementById('fAutoDate');
  const inp = document.getElementById('fDateStr');
  if(chk.checked){
    inp.value = getToday();
    inp.style.color = '#000'; // Đổi màu đen khi có ngày cụ thể
  } else {
    inp.value = '.... / .... / 2026';
    inp.style.color = '#d9534f'; // Màu đỏ cho mẫu trống dễ nhìn
  }
}

/* ---------- Tiện ích ---------- */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

const DRAFT_KEY='qmDataDraft';
const ONE_WEEK=7*24*60*60*1000;

/* ---------- Thu thập dữ liệu form ---------- */
function collectFormData(){
  return {
    isAutoDate: document.getElementById('fAutoDate').checked,
    date: document.getElementById('fDateStr').value.trim(),
    company:document.getElementById('fCompany').value.trim(),
    address:document.getElementById('fAddress').value.trim(),
    tax:document.getElementById('fTax').value.trim(),
    products:[...document.querySelectorAll('.proItem')].map(p=>({
      name:p.querySelector('.pName').value.trim(),
      info:p.querySelector('.pInfo').value.trim(),
      img:p.querySelector('.pImg').value.trim(),
      qty:p.querySelector('.pQty').value,
      price:p.querySelector('.pPrice').value
    }))
  };
}

/* ---------- Đổ dữ liệu vào form ---------- */
function populateForm(d){
  document.getElementById('fAutoDate').checked = d.isAutoDate || false;
  document.getElementById('fDateStr').value = d.date || '.... / .... / 2026';
  document.getElementById('fDateStr').style.color = d.isAutoDate ? '#000' : '#d9534f';
  
  document.getElementById('fCompany').value=d.company||'';
  document.getElementById('fAddress').value=d.address||'';
  document.getElementById('fTax').value=d.tax||'';

  const list=document.getElementById('proList');
  list.innerHTML='';                       
  if(!d.products||!d.products.length){
    addPro();return;                       
  }
  d.products.forEach(x=>{
    const el=document.createElement('div');el.className='proItem';
    el.innerHTML=`
      <div class="row"><input class="pName inp" placeholder="Tên sản phẩm"></div>
      <div class="row"><textarea class="pInfo inp" rows="3">• Giới hạn cân:
• Bước nhảy: d=
• Bảo hành 1 năm</textarea></div>
      <div class="row">
        <input type="text" class="pImg inp" placeholder="Link ảnh">
        <label class="upload-btn" onclick="this.nextElementSibling.click()">+</label>
        <input type="file" accept="image/*" onchange="uploadImg(this)">
      </div>
      <div class="dual">
        <div><label>Số lượng</label><input type="number" class="pQty inp" value="1"></div>
        <div><label>Đơn giá</label><input type="text" class="pPrice inp" placeholder="đ" oninput="formatPriceModal(this)"></div>
      </div>`;
    list.appendChild(el);

    const last=list.lastElementChild;
    last.querySelector('.pName').value=x.name||'';
    last.querySelector('.pInfo').value=x.info||'';
    last.querySelector('.pImg').value=x.img||'';
    last.querySelector('.pQty').value=x.qty||1;
    last.querySelector('.pPrice').value=x.price||'';
  });
}

/* ---------- Delete ---------- */
/* ---------- Delete (Chỉ xóa form, không xóa bản nháp) ---------- */
function deleteState(){
  // Thay đổi câu hỏi xác nhận
  if(!confirm('Bạn có chắc chắn muốn xóa toàn bộ dữ liệu đang nhập trên màn hình?')) return;
  
  // Đã bỏ dòng: localStorage.removeItem(DRAFT_KEY);

  // Trả các trường ngày tháng về mặc định
  document.getElementById('fAutoDate').checked = false;
  document.getElementById('fDateStr').value = '.... / .... / 2026';
  document.getElementById('fDateStr').style.color = '#d9534f';
  
  // Làm trắng các ô text thông tin chung
  document.getElementById('fCompany').value = '';
  document.getElementById('fAddress').value = '';
  document.getElementById('fTax').value = '';
  
  // Xóa toàn bộ danh sách sản phẩm hiện tại và tạo lại 1 ô sản phẩm trống mặc định
  document.getElementById('proList').innerHTML = '';
  addPro(); 
  
  // Cập nhật thông báo
  document.getElementById('restoreMsg').textContent = '';
  toast('Đã xóa!');
}
/* ---------- Save ---------- */
function saveState(){
  const payload={
    data:collectFormData(),
    ts:Date.now()
  };
  localStorage.setItem(DRAFT_KEY,JSON.stringify(payload));
  toast('Đã lưu bản nháp ✓');
}

/* ---------- Restore ---------- */
function restoreState(){
  const raw=localStorage.getItem(DRAFT_KEY);
  const msg=document.getElementById('restoreMsg');
  if(!raw){msg.textContent='Không có bản nháp nào.';return;}

  const saved=JSON.parse(raw);
  const age=Date.now()-saved.ts;
  if(age>ONE_WEEK){
    localStorage.removeItem(DRAFT_KEY);
    msg.textContent='Bản nháp đã hết hạn (1 tuần).';
    toast('Bản nháp đã hết hạn');
    return;
  }

  populateForm(saved.data);
  const date=new Date(saved.ts);
  msg.textContent='Đã khôi phục lúc '+date.toLocaleString('vi-VN');
  toast('Đã khôi phục bản nháp ✓');
}

/* ---------- Các hàm cũ ---------- */
function addPro(){
  const d=document.createElement('div');d.className='proItem';
  d.innerHTML=`
    <div class="row"><input class="pName inp" placeholder="Tên sản phẩm"></div>
    <div class="row"><textarea class="pInfo inp" rows="3">• Giới hạn cân:
• Bước nhảy: d=
• Bảo hành 1 năm</textarea></div>
    <div class="row">
      <input type="text" class="pImg inp" placeholder="Link ảnh">
      <label class="upload-btn" onclick="this.nextElementSibling.click()">+</label>
      <input type="file" accept="image/*" onchange="uploadImg(this)">
    </div>
    <div class="dual">
      <div><label>Số lượng</label><input type="number" class="pQty inp" value="1"></div>
      <div><label>Đơn giá</label><input type="text" class="pPrice inp" placeholder="đ" oninput="formatPriceModal(this)"></div>
    </div>`;
  document.getElementById('proList').appendChild(d);
}

function formatPriceModal(inp){
  let v=inp.value.replace(/\D/g,'');
  inp.value=v?parseFloat(v).toLocaleString('vi-VN'):'';
}
function uploadImg(input){
  if(input.files&&input.files[0]){
    const reader=new FileReader();
    reader.onload=e=>input.parentElement.querySelector('.pImg').value=e.target.result;
    reader.readAsDataURL(input.files[0]);
  }
}
function saveAndGo(){
  saveState(); 
  
  const data={
    date: document.getElementById('fDateStr').value.trim(), // <--- Truyền ngày đã chọn qua đây
    company:document.getElementById('fCompany').value.trim(),
    address:document.getElementById('fAddress').value.trim(),
    tax:document.getElementById('fTax').value.trim(),
    products:[...document.querySelectorAll('.proItem')].map(p=>({
      name:p.querySelector('.pName').value.trim(),
      info:p.querySelector('.pInfo').value.trim(),
      img:p.querySelector('.pImg').value.trim(),
      qty:parseFloat(p.querySelector('.pQty').value)||0,
      price:parseFloat(p.querySelector('.pPrice').value.replace(/\./g,''))||0
    })).filter(x=>x.name)
  };
  localStorage.setItem('qmData',JSON.stringify(data));
  location.href='/innhanh.html'; // Tùy chỉnh đường dẫn đến file in của bạn
}
</script>
</body>
</html>
