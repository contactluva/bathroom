<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Free Screen Recorder</title>
    <meta name="description" content="Free Full HD screen recorder. Record your screen in high quality directly from your browser.">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/inter-ui/3.19.3/inter.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #f2f2f7; /* Màu nền xám nhạt đặc trưng của iOS */
            color: #1c1c1e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        .intro {
            text-align: center;
            margin-bottom: 40px;
        }

        .intro.hidden {
            display: none;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        .features {
            font-size: 17px;
            color: #8e8e93;
            max-width: 480px;
            line-height: 1.5;
            margin: 0 auto;
        }

        .preview-container {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16/9;
            display: none;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            margin-bottom: 30px;
        }

        .preview-container.active {
            display: flex;
        }

        #preview {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .recording-indicator {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px); /* Hiệu ứng kính mờ iOS */
            -webkit-backdrop-filter: blur(10px);
            color: white;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .recording-indicator.active {
            display: flex;
        }

        .recording-dot {
            width: 10px;
            height: 10px;
            background: #ff3b30;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        /* Nút bấm phong cách iOS */
        .ios-btn {
            border: none;
            border-radius: 999px; /* Bo tròn hoàn toàn */
            cursor: pointer;
            font-weight: 600;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 40px;
            color: #fff;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            min-width: 240px;
        }

        .ios-btn:active {
            transform: scale(0.94); /* Hiệu ứng lún xuống khi bấm */
            opacity: 0.9;
        }

        /* Nút Ghi hình */
        #recordBtn {
            background: #ff3b30; /* System Red */
            box-shadow: 0 8px 24px rgba(255, 59, 48, 0.3);
        }

        #recordBtn.recording {
            background: #8e8e93; /* System Gray khi đang ghi */
            box-shadow: 0 8px 24px rgba(142, 142, 147, 0.3);
        }

        /* Nút Tải xuống */
        #downloadBtn {
            background: #007aff; /* System Blue */
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.3);
            display: none;
        }

        #downloadBtn.visible {
            display: flex;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="intro" id="intro">
            <h1>Screen Recorder</h1>
            <p class="features">
                Ghi hình 1080p (40 FPS) không kèm âm thanh để tối ưu hiệu năng.
            </p>
        </div>

        <div class="preview-container" id="previewContainer">
            <video id="preview" autoplay muted></video>
            <div class="recording-indicator">
                <div class="recording-dot"></div>
                Đang ghi hình
            </div>
        </div>

        <div class="controls">
            <button id="recordBtn" class="ios-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <circle cx="12" cy="12" r="4" fill="currentColor"/>
                </svg>
                <span>Bắt đầu ghi</span>
            </button>

            <button id="downloadBtn" class="ios-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Lưu Video
            </button>
        </div>
    </div>

    <script>
        const preview = document.getElementById('preview');
        const recordBtn = document.getElementById('recordBtn');
        const recordBtnText = recordBtn.querySelector('span');
        const downloadBtn = document.getElementById('downloadBtn');
        const intro = document.getElementById('intro');
        const previewContainer = document.getElementById('previewContainer');
        const recordingIndicator = document.querySelector('.recording-indicator');

        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;

        const updateRecordingState = (recording) => {
            isRecording = recording;
            
            // Cập nhật giao diện nút Ghi hình
            if (recording) {
                recordBtn.classList.add('recording');
                recordBtn.innerHTML = `
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="6" y="6" width="12" height="12" rx="2"/>
                    </svg>
                    <span>Dừng ghi hình</span>
                `;
            } else {
                recordBtn.classList.remove('recording');
                recordBtn.innerHTML = `
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <circle cx="12" cy="12" r="4" fill="currentColor"/>
                    </svg>
                    <span>Bắt đầu ghi</span>
                `;
            }

            recordingIndicator.classList.toggle('active', recording);
            document.title = recording ? 'Đang ghi... | Screen Recorder' : 'Screen Recorder';
            downloadBtn.classList.remove('visible');
            
            if (!recording) {
                preview.controls = true;
            }

            if (recording || recordedChunks.length > 0) {
                intro.classList.add('hidden');
                previewContainer.classList.add('active');
            }
        };

        recordBtn.onclick = async () => {
            if (isRecording) {
                stopRecording();
                return;
            }

            recordedChunks = [];
            downloadBtn.classList.remove('visible');
            
            try {
                // Đã loại bỏ hoàn toàn phần Audio, chỉ yêu cầu Video
                const screenStream = await navigator.mediaDevices.getDisplayMedia({
    video: {
        displaySurface: 'monitor',
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        // Sử dụng 'max' để tạo giới hạn trần, buộc trình duyệt không được vượt qua
        frameRate: { max: 30 }, 
        cursor: 'always'
    }
});

                preview.srcObject = screenStream;
                preview.muted = true;
                preview.controls = false;

                // Khởi tạo MediaRecorder không có cấu hình audioBitsPerSecond
                mediaRecorder = new MediaRecorder(screenStream, {
    mimeType: 'video/webm', /* Bỏ ;codecs=vp9 để trình duyệt tự tối ưu phần cứng */
    videoBitsPerSecond: 5000000 
});

                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) {
                        recordedChunks.push(e.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    preview.srcObject = null;
                    preview.src = URL.createObjectURL(blob);
                    preview.controls = true;
                    downloadBtn.classList.add('visible');
                };

                mediaRecorder.start(1000);
                updateRecordingState(true);

                // Dừng ghi hình nếu người dùng bấm "Stop sharing" trên thanh công cụ của trình duyệt
                screenStream.getVideoTracks()[0].onended = () => {
                    stopRecording();
                };

            } catch (err) {
                console.error('Recording error:', err);
                updateRecordingState(false);
            }
        };

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                preview.srcObject?.getTracks().forEach(track => track.stop());
                updateRecordingState(false);
            }
        }

        downloadBtn.onclick = () => {
            if (recordedChunks.length === 0) return;
            
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            
            // Đã fix lỗi download: Tạo thẻ <a> và append vào document body
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `screen-recording-1080p-${new Date().toISOString()}.webm`;
            
            document.body.appendChild(a); // Bước quan trọng để trình duyệt cho phép tải
            a.click();
            document.body.removeChild(a); // Dọn dẹp DOM sau khi click
            
            URL.revokeObjectURL(url);
        };
    </script>
</body>
</html>
