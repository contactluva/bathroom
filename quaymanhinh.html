<script>
        const preview = document.getElementById('preview');
        const recordBtn = document.getElementById('recordBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const intro = document.getElementById('intro');
        const previewContainer = document.getElementById('previewContainer');
        const recordingIndicator = document.querySelector('.recording-indicator');
        const fpsSelect = document.getElementById('fpsSelect');

        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let screenStream = null;

        // TỐI ƯU CHO INTEL QUICK SYNC (CORE i7 Gen 10)
        const getBestMimeType = () => {
            const types = [
                'video/webm;codecs="h264"', // Ưu tiên số 1: Tận dụng tuyệt đối phần cứng Intel
                'video/webm;codecs=avc1',   // Một định dạng H.264 khác
                'video/webm;codecs="vp8"',  // Phương án dự phòng (nhẹ hơn VP9)
                'video/webm'                // Mặc định
            ];
            for (let type of types) {
                if (MediaRecorder.isTypeSupported(type)) {
                    console.log("Card Intel UHD đang dùng codec:", type);
                    return type;
                }
            }
            return '';
        };

        const updateRecordingState = (recording) => {
            isRecording = recording;
            fpsSelect.disabled = recording;
            
            if (recording) {
                recordBtn.classList.add('recording');
                recordBtn.innerHTML = `
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="6" y="6" width="12" height="12" rx="2"/>
                    </svg>
                    <span>Dừng ghi hình</span>
                `;
            } else {
                recordBtn.classList.remove('recording');
                recordBtn.innerHTML = `
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <circle cx="12" cy="12" r="4" fill="currentColor"/>
                    </svg>
                    <span>Bắt đầu ghi</span>
                `;
            }

            recordingIndicator.classList.toggle('active', recording);
            document.title = recording ? 'Đang ghi... | Screen Recorder' : 'Screen Recorder';
            downloadBtn.classList.remove('visible');
            
            if (!recording) {
                preview.controls = true;
            }

            if (recording || recordedChunks.length > 0) {
                intro.classList.add('hidden');
                previewContainer.classList.add('active');
            }
        };

        recordBtn.onclick = async () => {
            if (isRecording) {
                stopRecording();
                return;
            }

            recordedChunks = [];
            downloadBtn.classList.remove('visible');
            const selectedFps = parseInt(fpsSelect.value, 10);
            
            try {
                // Tối ưu cho Latitude 5310: Bỏ ép cứng độ phân giải để tránh xung đột với Windows Display Scaling
                screenStream = await navigator.mediaDevices.getDisplayMedia({
                    video: {
                        displaySurface: 'monitor',
                        width: { ideal: 1920 }, // Chỉ dùng ideal, không dùng max để trình duyệt tự tương thích
                        height: { ideal: 1080 },
                        frameRate: { ideal: selectedFps, max: selectedFps }, 
                        cursor: 'always'
                    }
                });

                preview.srcObject = screenStream;
                preview.muted = true;
                preview.controls = false;

                // Tinh chỉnh Bitrate phù hợp với i7 Gen 10U
                // Không để quá cao (gây thắt nút cổ chai ổ cứng/RAM) nhưng đủ sắc nét
                const dynamicBitrate = selectedFps === 50 ? 4500000 : 3000000; 

                mediaRecorder = new MediaRecorder(screenStream, {
                    mimeType: getBestMimeType(), 
                    videoBitsPerSecond: dynamicBitrate 
                });

                mediaRecorder.ondataavailable = e => {
                    if (e.data && e.data.size > 0) {
                        recordedChunks.push(e.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
                    preview.srcObject = null;
                    preview.src = URL.createObjectURL(blob);
                    preview.controls = true;
                    downloadBtn.classList.add('visible');
                };

                // Thu gom dữ liệu mỗi 2 giây (2000ms) để giải phóng RAM cho laptop thay vì dồn cục
                mediaRecorder.start(2000); 
                
                updateRecordingState(true);

                screenStream.getVideoTracks()[0].onended = () => {
                    if (isRecording) stopRecording();
                };

            } catch (err) {
                console.error('Lỗi khi bắt đầu ghi hình:', err);
                updateRecordingState(false);
            }
        };

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                if (screenStream) {
                    screenStream.getTracks().forEach(track => track.stop());
                }
                updateRecordingState(false);
            }
        }

        downloadBtn.onclick = () => {
            if (recordedChunks.length === 0) return;
            
            const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            // Xác định đuôi file MP4 hoặc WEBM dựa trên codec trình duyệt lấy được
            const extension = mediaRecorder.mimeType.includes('h264') ? 'mp4' : 'webm';
            a.download = `latitude-record-${fpsSelect.value}fps.${extension}`;
            
            document.body.appendChild(a); 
            a.click();
            setTimeout(() => {
                document.body.removeChild(a); 
                URL.revokeObjectURL(url);
            }, 100);
        };
    </script>
