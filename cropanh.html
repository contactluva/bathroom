<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Batch Tool</title>

<style>
body { font-family: Arial; padding: 20px; }
h3 { margin-top: 40px; }

.grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 20px;
}

.image-item {
  border: 1px solid #ddd;
  padding: 10px;
  border-radius: 8px;
  background: #fafafa;
}

img { width: 100%; border-radius: 6px; }

.download-btn {
  margin-top: 6px;
  width: 100%;
  padding: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>Batch Tool</h2>

<h3>Crop 91%</h3>
<input type="file" id="cropInput" multiple>
<div id="cropOutput" class="grid"></div>

<h3>Watermark</h3>
<input type="file" id="wmInput" multiple>
<div id="wmOutput" class="grid"></div>

<h3>Crop Bottom 15%</h3>
<input type="file" id="cropBottomInput" multiple>
<div id="cropBottomOutput" class="grid"></div>

<script>

// ===== WATERMARK =====
const watermarkSrc = "https://raw.githubusercontent.com/contactluva/bathroom/refs/heads/main/899.png";
let watermarkImg = null;

const wm = new Image();
wm.crossOrigin = "anonymous";
wm.src = watermarkSrc;
wm.onload = () => watermarkImg = wm;

// ===== INPUT =====
cropInput.onchange = e => handleFiles(e.target.files, cropOutput, "crop");
wmInput.onchange = e => handleFiles(e.target.files, wmOutput, "wm");
cropBottomInput.onchange = e => handleFiles(e.target.files, cropBottomOutput, "bottom");

// ===== MAIN PIPELINE =====
function handleFiles(files, target, type) {
  target.innerHTML = '';

  Array.from(files).forEach(file => {
    const reader = new FileReader();

    reader.onload = e => {
      const img = new Image();
      img.src = e.target.result;

      img.onload = () => processImage(img, file.name, target, type);
    };

    reader.readAsDataURL(file);
  });
}

function processImage(img, filename, target, type) {

  // ===== STEP 1: xử lý riêng từng tool =====
  let canvas = document.createElement('canvas');
  let ctx = canvas.getContext('2d');

  if (type === "crop") {
    canvas.width = img.width * 0.91;
    canvas.height = img.height * 0.91;
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  } else if (type === "bottom") {
    canvas.width = img.width;
    canvas.height = img.height * 0.85;
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  } else {
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    if (watermarkImg) {
      const wmWidth = 59;
      const scale = wmWidth / watermarkImg.width;
      const wmHeight = watermarkImg.height * scale;

      const x = canvas.width - wmWidth - 14;
      const y = canvas.height - wmHeight + 2;

      ctx.drawImage(watermarkImg, x, y, wmWidth, wmHeight);
    }
  }

  // ===== STEP 2: resize chuẩn Pinterest =====
  canvas = resizeCanvas(canvas, 1500);
  ctx = canvas.getContext('2d');

  // ===== STEP 3: random filter =====
  const b = 1 + (Math.random() - 0.5) * 0.1;
  const c = 1 + (Math.random() - 0.5) * 0.1;
  const s = 1 + (Math.random() - 0.5) * 0.1;

  ctx.filter = `brightness(${b}) contrast(${c}) saturate(${s})`;
  ctx.drawImage(canvas, 0, 0);
  ctx.filter = 'none';

  // ===== STEP 4: noise =====
  addNoise(ctx, canvas.width, canvas.height);

  // ===== STEP 5: warp =====
  subtleWarp(canvas);

  // ===== STEP 6: export (xoá metadata) =====
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    display(url, filename, target);
  }, 'image/jpeg', 0.82 + Math.random() * 0.08);
}

// ===== RESIZE =====
function resizeCanvas(oldCanvas, maxSize) {
  let w = oldCanvas.width;
  let h = oldCanvas.height;

  if (w <= maxSize && h <= maxSize) return oldCanvas;

  let ratio = Math.min(maxSize / w, maxSize / h);

  const canvas = document.createElement('canvas');
  canvas.width = w * ratio;
  canvas.height = h * ratio;

  const ctx = canvas.getContext('2d');
  ctx.drawImage(oldCanvas, 0, 0, canvas.width, canvas.height);

  return canvas;
}

// ===== NOISE =====
function addNoise(ctx, w, h) {
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;

  for (let i = 0; i < data.length; i += 4) {
    const n = (Math.random() - 0.5) * 6;
    data[i] += n;
    data[i+1] += n;
    data[i+2] += n;
  }

  ctx.putImageData(imgData, 0, 0);
}

// ===== WARP =====
function subtleWarp(canvas) {
  const ctx = canvas.getContext('2d');

  const temp = document.createElement('canvas');
  temp.width = canvas.width;
  temp.height = canvas.height;

  const tctx = temp.getContext('2d');
  tctx.drawImage(canvas, 0, 0);

  const shift = 3;

  for (let y = 0; y < canvas.height; y++) {
    const dx = Math.sin(y * 0.02) * shift;
    ctx.drawImage(temp, 0, y, canvas.width, 1, dx, y, canvas.width, 1);
  }
}

// ===== UI =====
function display(url, filename, target) {
  const div = document.createElement('div');
  div.className = 'image-item';

  const img = document.createElement('img');
  img.src = url;

  const btn = document.createElement('button');
  btn.className = 'download-btn';
  btn.textContent = 'Download';

  btn.onclick = () => {
    const a = document.createElement('a');
    a.href = url;
    a.download = filename.replace(/\.[^/.]+$/, "") + ".jpg";
    a.click();
  };

  div.appendChild(img);
  div.appendChild(btn);
  target.appendChild(div);
}

</script>

</body>
</html>
