<!DOCTYPE html> <html lang="vi"> <head> <meta charset="UTF-8"> <title>Batch Tool</title> <style> body { font-family: Arial; padding: 20px; } h3 { margin-top: 40px; } .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 20px; margin-top: 10px; } .image-item { position: relative; border: 1px solid #ddd; padding: 10px; border-radius: 8px; background: #fafafa; } .image-wrapper { position: relative; } img { width: 100%; display: block; border-radius: 6px; } .download-btn { position: absolute; top: 8px; right: 8px; padding: 10px 12px; font-size: 12px; background: rgba(0,0,0,0.9); color: #fff; border: none; border-radius: 4px; cursor: pointer; } .filename { margin-top: 8px; font-size: 12px; word-break: break-all; } </style> </head> <body> <h2>Batch Tool</h2> <h3>Crop Tool</h3> <input type="file" id="cropInput" multiple accept="image/*"> <div id="cropOutput" class="grid"></div> <h3>Watermark Tool</h3> <input type="file" id="wmInput" multiple accept="image/*"> <div id="wmOutput" class="grid"></div> <h3>Crop Bottom 15%</h3> <input type="file" id="cropBottomInput" multiple accept="image/*"> <div id="cropBottomOutput" class="grid"></div> <script> // ===== WATERMARK ===== const watermarkSrc = "https://raw.githubusercontent.com/contactluva/bathroom/refs/heads/main/899.png"; let watermarkImg = null; const wm = new Image(); wm.crossOrigin = "anonymous"; wm.src = watermarkSrc; wm.onload = () => watermarkImg = wm; // ===== INPUT ===== const cropInput = document.getElementById('cropInput'); const wmInput = document.getElementById('wmInput'); const cropBottomInput = document.getElementById('cropBottomInput'); const cropOutput = document.getElementById('cropOutput'); const wmOutput = document.getElementById('wmOutput'); const cropBottomOutput = document.getElementById('cropBottomOutput'); // ===== EVENTS ===== cropInput.onchange = e => { cropOutput.innerHTML = ''; handleCrop(e.target.files); }; wmInput.onchange = e => { wmOutput.innerHTML = ''; handleWatermark(e.target.files); }; cropBottomInput.onchange = e => { cropBottomOutput.innerHTML = ''; handleCropBottom(e.target.files); }; // ===== EFFECT PIPELINE ===== function applyEffects(canvas, ctx, w, h) { // FILTER const b = 1 + (Math.random() - 0.5) * 0.1; const c = 1 + (Math.random() - 0.5) * 0.1; const s = 1 + (Math.random() - 0.5) * 0.1; ctx.filter = brightness(${b}) contrast(${c}) saturate(${s}); const temp = document.createElement('canvas'); temp.width = w; temp.height = h; const tctx = temp.getContext('2d'); tctx.drawImage(canvas, 0, 0); ctx.clearRect(0, 0, w, h); ctx.drawImage(temp, 0, 0); ctx.filter = 'none'; // NOISE const imgData = ctx.getImageData(0, 0, w, h); const data = imgData.data; for (let i = 0; i < data.length; i += 4) { const n = (Math.random() - 0.5) * 6; data[i] += n; data[i+1] += n; data[i+2] += n; } ctx.putImageData(imgData, 0, 0); // LIQUID WARP (multi-point) subtleWarp(ctx, w, h); } // ===== WARP MULTI-POINT ===== function subtleWarp(ctx, w, h) { const src = ctx.getImageData(0, 0, w, h); const dst = ctx.createImageData(w, h); const srcData = src.data; const dstData = dst.data; const points = []; const count = 2 + Math.floor(Math.random() * 3); // 2–4 điểm for (let i = 0; i < count; i++) { points.push({ x: Math.random() * w, y: Math.random() * h, radius: 40 + Math.random() * 60, strength: (Math.random() - 0.5) * 6 }); } for (let y = 0; y < h; y++) { for (let x = 0; x < w; x++) { let dx = 0; let dy = 0; for (let p of points) { const distX = x - p.x; const distY = y - p.y; const dist = Math.sqrt(distX * distX + distY * distY); if (dist < p.radius) { const power = 1 - dist / p.radius; dx += distX * power * p.strength * 0.01; dy += distY * power * p.strength * 0.01; } } const sx = Math.max(0, Math.min(w - 1, Math.round(x + dx))); const sy = Math.max(0, Math.min(h - 1, Math.round(y + dy))); const si = (sy * w + sx) * 4; const di = (y * w + x) * 4; dstData[di] = srcData[si]; dstData[di+1] = srcData[si+1]; dstData[di+2] = srcData[si+2]; dstData[di+3] = srcData[si+3]; } } ctx.putImageData(dst, 0, 0); } // ===== EXPORT ===== function exportImage(canvas, filename, target) { canvas.toBlob(blob => { const url = URL.createObjectURL(blob); displayResult(url, filename, target); }, 'image/jpeg', 0.82 + Math.random() * 0.08); } // ===== CROP 91% ===== function handleCrop(files) { Array.from(files).forEach(file => { const reader = new FileReader(); reader.onload = e => { const img = new Image(); img.src = e.target.result; img.onload = () => { const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); const w = img.width * 0.91; const h = img.height * 0.91; canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h, 0, 0, w, h); applyEffects(canvas, ctx, w, h); exportImage(canvas, file.name, cropOutput); }; }; reader.readAsDataURL(file); }); } // ===== WATERMARK ===== function handleWatermark(files) { Array.from(files).forEach(file => { const reader = new FileReader(); reader.onload = e => { const img = new Image(); img.src = e.target.result; img.onload = () => { if (!watermarkImg) return; const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); canvas.width = img.width; canvas.height = img.height; ctx.drawImage(img, 0, 0); const wmWidth = 59; const scale = wmWidth / watermarkImg.width; const wmHeight = watermarkImg.height * scale; const x = canvas.width - wmWidth - 14; const y = canvas.height - wmHeight + 2; ctx.drawImage(watermarkImg, x, y, wmWidth, wmHeight); applyEffects(canvas, ctx, canvas.width, canvas.height); exportImage(canvas, file.name, wmOutput); }; }; reader.readAsDataURL(file); }); } // ===== CROP BOTTOM ===== function handleCropBottom(files) { Array.from(files).forEach(file => { const reader = new FileReader(); reader.onload = e => { const img = new Image(); img.src = e.target.result; img.onload = () => { const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); const newH = img.height * 0.85; canvas.width = img.width; canvas.height = newH; ctx.drawImage(img, 0, 0, img.width, newH, 0, 0, img.width, newH); applyEffects(canvas, ctx, canvas.width, canvas.height); exportImage(canvas, file.name, cropBottomOutput); }; }; reader.readAsDataURL(file); }); } // ===== UI ===== function displayResult(url, filename, target) { const container = document.createElement('div'); container.className = 'image-item'; const wrapper = document.createElement('div'); wrapper.className = 'image-wrapper'; const img = document.createElement('img'); img.src = url; const btn = document.createElement('button'); btn.className = 'download-btn'; btn.textContent = '↓'; btn.onclick = () => { const link = document.createElement('a'); link.href = url; link.download = filename.replace(/\.[^/.]+$/, "") + ".jpg"; link.click(); }; const name = document.createElement('div'); name.className = 'filename'; name.textContent = filename; wrapper.appendChild(img); wrapper.appendChild(btn); container.appendChild(wrapper); container.appendChild(name); target.appendChild(container); } </script> </body> </html>
