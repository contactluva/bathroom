<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Batch Tool</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  padding: 16px;
  background: #f5f7fb;
  color: #222;
}

/* TITLE */
h2 {
  font-size: 24px;
  margin-bottom: 10px;
}

h3 {
  margin-top: 30px;
  font-size: 18px;
  font-weight: 600;
}

/* INPUT */
input[type="file"] {
  margin-top: 10px;
  padding: 10px;
  border: 1px dashed #ccc;
  border-radius: 10px;
  background: #fff;
  cursor: pointer;
  width: 100%;
  max-width: 400px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 16px;
  margin-top: 15px;
}

/* CARD */
.image-item {
  background: #fff;
  border-radius: 14px;
  padding: 10px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.06);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.image-item:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* IMAGE */
.image-wrapper {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
}

img {
  width: 100%;
  display: block;
  border-radius: 10px;
}

/* BUTTON */
.download-btn {
  position: absolute;
  bottom: 8px;
  right: 8px;
  padding: 8px 10px;
  font-size: 12px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  opacity: 0;
  transition: 0.2s;
}

.image-wrapper:hover .download-btn {
  opacity: 1;
}

/* FILENAME */
.filename {
  margin-top: 6px;
  font-size: 11px;
  color: #666;
  text-align: center;
}

/* MOBILE */
@media (max-width: 600px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  h2 { font-size: 20px; }
  h3 { font-size: 16px; }

  .download-btn {
    opacity: 1;
    bottom: 6px;
    right: 6px;
  }
}
</style>
</head>

<body>

<h2>Batch Tool</h2>

<h3>Crop Tool</h3>
<input type="file" id="cropInput" multiple accept="image/*">
<div id="cropOutput" class="grid"></div>

<h3>Watermark Tool</h3>
<input type="file" id="wmInput" multiple accept="image/*">
<div id="wmOutput" class="grid"></div>

<h3>Crop Bottom 15%</h3>
<input type="file" id="cropBottomInput" multiple accept="image/*">
<div id="cropBottomOutput" class="grid"></div>

<script>
// ===== WATERMARK =====
const watermarkSrc = "https://raw.githubusercontent.com/contactluva/bathroom/refs/heads/main/899.png";
let watermarkImg = null;

const wm = new Image();
wm.crossOrigin = "anonymous";
wm.src = watermarkSrc;
wm.onload = () => watermarkImg = wm;

// ===== INPUT =====
const cropInput = document.getElementById('cropInput');
const wmInput = document.getElementById('wmInput');
const cropBottomInput = document.getElementById('cropBottomInput');

const cropOutput = document.getElementById('cropOutput');
const wmOutput = document.getElementById('wmOutput');
const cropBottomOutput = document.getElementById('cropBottomOutput');

// ===== EVENTS =====
cropInput.onchange = e => {
  cropOutput.innerHTML = '';
  handleCrop(e.target.files);
};

wmInput.onchange = e => {
  wmOutput.innerHTML = '';
  handleWatermark(e.target.files);
};

cropBottomInput.onchange = e => {
  cropBottomOutput.innerHTML = '';
  handleCropBottom(e.target.files);
};

// ===== EFFECT PIPELINE =====
function applyEffects(canvas, ctx, w, h) {
  const b = 1 + (Math.random() - 0.5) * 0.1;
  const c = 1 + (Math.random() - 0.5) * 0.1;
  const s = 1 + (Math.random() - 0.5) * 0.1;

  ctx.filter = `brightness(${b}) contrast(${c}) saturate(${s})`;

  const temp = document.createElement('canvas');
  temp.width = w;
  temp.height = h;
  const tctx = temp.getContext('2d');

  tctx.drawImage(canvas, 0, 0);
  ctx.clearRect(0, 0, w, h);
  ctx.drawImage(temp, 0, 0);
  ctx.filter = 'none';

  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;

  for (let i = 0; i < data.length; i += 4) {
    const n = (Math.random() - 0.5) * 6;
    data[i] += n;
    data[i+1] += n;
    data[i+2] += n;
  }

  ctx.putImageData(imgData, 0, 0);

  subtleWarp(ctx, w, h);
}

// ===== WARP =====
function subtleWarp(ctx, w, h) {
  const src = ctx.getImageData(0, 0, w, h);
  const dst = ctx.createImageData(w, h);

  const s = src.data;
  const d = dst.data;

  const points = [];
  const count = 2 + Math.floor(Math.random() * 3);

  for (let i = 0; i < count; i++) {
    points.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: 40 + Math.random() * 60,
      s: (Math.random() - 0.5) * 6
    });
  }

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {

      let dx = 0, dy = 0;

      for (let p of points) {
        const dxp = x - p.x;
        const dyp = y - p.y;
        const dist = Math.sqrt(dxp*dxp + dyp*dyp);

        if (dist < p.r) {
          const power = 1 - dist / p.r;
          dx += dxp * power * p.s * 0.01;
          dy += dyp * power * p.s * 0.01;
        }
      }

      const sx = Math.max(0, Math.min(w-1, Math.round(x+dx)));
      const sy = Math.max(0, Math.min(h-1, Math.round(y+dy)));

      const si = (sy*w + sx)*4;
      const di = (y*w + x)*4;

      d[di] = s[si];
      d[di+1] = s[si+1];
      d[di+2] = s[si+2];
      d[di+3] = s[si+3];
    }
  }

  ctx.putImageData(dst, 0, 0);
}

// ===== EXPORT =====
function exportImage(canvas, filename, target) {
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    displayResult(url, filename, target);
  }, 'image/jpeg', 0.82 + Math.random() * 0.08);
}

// ===== HANDLERS =====
function handleCrop(files) {
  Array.from(files).forEach(file => {
    const reader = new FileReader();

    reader.onload = e => {
      const img = new Image();
      img.src = e.target.result;

      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        const w = img.width * 0.91;
        const h = img.height * 0.91;

        canvas.width = w;
        canvas.height = h;

        ctx.drawImage(img, 0, 0, w, h, 0, 0, w, h);

        applyEffects(canvas, ctx, w, h);
        exportImage(canvas, file.name, cropOutput);
      };
    };

    reader.readAsDataURL(file);
  });
}

function handleWatermark(files) {
  Array.from(files).forEach(file => {
    const reader = new FileReader();

    reader.onload = e => {
      const img = new Image();
      img.src = e.target.result;

      img.onload = () => {
        if (!watermarkImg) return;

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);

        const wmWidth = 59;
        const scale = wmWidth / watermarkImg.width;
        const wmHeight = watermarkImg.height * scale;

        const x = canvas.width - wmWidth - 14;
        const y = canvas.height - wmHeight + 2;

        ctx.drawImage(watermarkImg, x, y, wmWidth, wmHeight);

        applyEffects(canvas, ctx, canvas.width, canvas.height);
        exportImage(canvas, file.name, wmOutput);
      };
    };

    reader.readAsDataURL(file);
  });
}

function handleCropBottom(files) {
  Array.from(files).forEach(file => {
    const reader = new FileReader();

    reader.onload = e => {
      const img = new Image();
      img.src = e.target.result;

      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        const newH = img.height * 0.85;

        canvas.width = img.width;
        canvas.height = newH;

        ctx.drawImage(img, 0, 0, img.width, newH, 0, 0, img.width, newH);

        applyEffects(canvas, ctx, canvas.width, canvas.height);
        exportImage(canvas, file.name, cropBottomOutput);
      };
    };

    reader.readAsDataURL(file);
  });
}

// ===== UI =====
function displayResult(url, filename, target) {
  const container = document.createElement('div');
  container.className = 'image-item';

  const wrapper = document.createElement('div');
  wrapper.className = 'image-wrapper';

  const img = document.createElement('img');
  img.src = url;

  const btn = document.createElement('button');
  btn.className = 'download-btn';
  btn.textContent = '↓';

  btn.onclick = () => {
    const link = document.createElement('a');
    link.href = url;
    link.download = filename.replace(/\.[^/.]+$/, "") + ".jpg";
    link.click();
  };

  const name = document.createElement('div');
  name.className = 'filename';
  name.textContent = filename;

  wrapper.appendChild(img);
  wrapper.appendChild(btn);
  container.appendChild(wrapper);
  container.appendChild(name);

  target.appendChild(container);
}
</script>

</body>
</html>
