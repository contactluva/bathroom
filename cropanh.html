<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Batch Tool Pro</title>
<style>
body { font-family: Arial; background: #f5f7fb; padding: 20px; }
.container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
.card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
.image-item { position: relative; }
img, video { width: 100%; border-radius: 8px; }
.btn { margin-top: 10px; padding: 10px; width: 100%; border: none; border-radius: 8px; background: #4f46e5; color: #fff; cursor: pointer; }
.download-btn { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.7); color: #fff; border: none; padding: 6px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.filename { font-size: 11px; }
</style>
</head>
<body>

<h1>Batch Tool Pro</h1>

<div class="container">

<!-- IMAGE -->
<div class="card">
<h2>Image Tools</h2>

<h3>Crop 91%</h3>
<input type="file" id="cropInput" multiple>
<div id="cropOutput" class="grid"></div>

<h3>Watermark</h3>
<input type="file" id="wmInput" multiple>
<div id="wmOutput" class="grid"></div>

<h3>Crop Bottom 15%</h3>
<input type="file" id="cropBottomInput" multiple>
<div id="cropBottomOutput" class="grid"></div>

</div>

<!-- VIDEO -->
<div class="card">
<h2>Video Tool</h2>
<input type="file" id="videoInput">
<video id="preview" controls></video>
<button class="btn" id="processVideo">Process Video</button>
</div>

</div>

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>

<script>
// ===== IMAGE =====
function processImage(file, callback) {
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img,0,0);
    ctx.filter = `brightness(${1+(Math.random()-0.5)*0.1})
                  contrast(${1+(Math.random()-0.5)*0.1})
                  saturate(${1+(Math.random()-0.5)*0.1})`;
    ctx.drawImage(canvas,0,0);
    canvas.toBlob(blob=>{
      const url = URL.createObjectURL(blob);
      callback(url, file.name);
    },'image/jpeg',0.9);
  };
  img.src = URL.createObjectURL(file);
}

function display(url,name,target){
  const div=document.createElement('div');
  div.className='image-item';
  const img=document.createElement('img');
  img.src=url;
  const btn=document.createElement('button');
  btn.className='download-btn';
  btn.textContent='↓';
  btn.onclick=()=>{
    const a=document.createElement('a');
    a.href=url;
    a.download=name;
    a.click();
  };
  const t=document.createElement('div');
  t.className='filename';
  t.textContent=name;
  div.append(img,btn,t);
  target.appendChild(div);
}

cropInput.onchange=e=>{
  cropOutput.innerHTML='';
  [...e.target.files].forEach(f=>processImage(f,(url,name)=>display(url,name,cropOutput)));
};
wmInput.onchange=e=>{
  wmOutput.innerHTML='';
  [...e.target.files].forEach(f=>processImage(f,(url,name)=>display(url,name,wmOutput)));
};
cropBottomInput.onchange=e=>{
  cropBottomOutput.innerHTML='';
  [...e.target.files].forEach(f=>processImage(f,(url,name)=>display(url,name,cropBottomOutput)));
};

// ===== VIDEO FIXED =====
const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({ log: false });

let file;

videoInput.onchange = e=>{
  file = e.target.files[0];
  preview.src = URL.createObjectURL(file);
};

processVideo.onclick = async ()=>{
  if(!file) return;
  processVideo.textContent="Processing...";
  processVideo.disabled=true;

  try {
    if(!ffmpeg.isLoaded()) await ffmpeg.load();

    // Ghi file vào hệ thống file ảo
    await ffmpeg.FS('writeFile', 'in', await fetchFile(file));

    const fakeTime = new Date(Date.now() - Math.random()*1e10).toISOString();

    // Chạy lệnh FFmpeg
    await ffmpeg.run(
      '-i','in',
      '-map_metadata','-1',
      '-metadata','creation_time='+fakeTime,
      '-vf','noise=alls=1:allf=t+u',
      '-c:v','libvpx-vp9',
      '-b:v','0',
      '-crf','30',
      '-c:a','libopus',
      'out.webm'
    );

    // Đọc file kết quả
    const data = ffmpeg.FS('readFile','out.webm');
    const url = URL.createObjectURL(new Blob([data.buffer],{type:'video/webm'}));
    const a=document.createElement('a');
    a.href=url;
    a.download=file.name+"_clean.webm";
    a.click();
  } catch (err) {
    console.error(err);
    alert("Lỗi xử lý video: " + err.message);
  }

  processVideo.textContent="Process Video";
  processVideo.disabled=false;
};
</script>

</body>
</html>
