<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Batch Tool</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    h3 {
      margin-top: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 20px;
      margin-top: 10px;
    }

    .image-item {
      position: relative;
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 8px;
      background: #fafafa;
    }

    .image-wrapper {
      position: relative;
    }

    img {
      width: 100%;
      display: block;
      border-radius: 6px;
    }

    .download-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 10px 12px;
      font-size: 12px;
      background: rgba(0,0,0,0.9);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .filename {
      margin-top: 8px;
      font-size: 12px;
      word-break: break-all;
    }
  </style>
</head>
<body>

<h2>Batch Tool</h2>

<!-- ===== CROP TOOL ===== -->
<h3>Crop Tool</h3>
<input type="file" id="cropInput" multiple accept="image/*">
<div id="cropOutput" class="grid"></div>

<!-- ===== WATERMARK TOOL ===== -->
<h3>Watermark Tool</h3>
<input type="file" id="wmInput" multiple accept="image/*">
<div id="wmOutput" class="grid"></div>

<script>
// ===== WATERMARK CONFIG =====
const watermarkSrc = "https://raw.githubusercontent.com/contactluva/bathroom/refs/heads/main/899.png";
let watermarkImg = null;

const wm = new Image();
wm.crossOrigin = "anonymous";
wm.src = watermarkSrc;
wm.onload = () => {
  watermarkImg = wm;
};

// ===== INPUTS =====
const cropInput = document.getElementById('cropInput');
const wmInput = document.getElementById('wmInput');

const cropOutput = document.getElementById('cropOutput');
const wmOutput = document.getElementById('wmOutput');

// ===== EVENTS =====
cropInput.addEventListener('change', (e) => {
  cropOutput.innerHTML = '';
  handleCrop(e.target.files);
});

wmInput.addEventListener('change', (e) => {
  wmOutput.innerHTML = '';
  handleWatermark(e.target.files);
});

// ===== CROP =====
function handleCrop(files) {
  Array.from(files).forEach(file => {
    const reader = new FileReader();

    reader.onload = function(e) {
      const img = new Image();
      img.src = e.target.result;

      img.onload = function() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        const newWidth = img.width * 0.91;
        const newHeight = img.height * 0.91;

        canvas.width = newWidth;
        canvas.height = newHeight;

        ctx.drawImage(img, 0, 0, newWidth, newHeight, 0, 0, newWidth, newHeight);

        const dataURL = canvas.toDataURL('image/jpeg', 0.9);
        displayResult(dataURL, file.name, cropOutput);
      };
    };

    reader.readAsDataURL(file);
  });
}

// ===== WATERMARK =====
function handleWatermark(files) {
  Array.from(files).forEach(file => {
    const reader = new FileReader();

    reader.onload = function(e) {
      const img = new Image();
      img.src = e.target.result;

      img.onload = function() {
        if (!watermarkImg) return;

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);

        const wmWidth = 59;
        const scale = wmWidth / watermarkImg.width;
        const wmHeight = watermarkImg.height * scale;

        const x = canvas.width - wmWidth - 14;
        const y = canvas.height - wmHeight + 2;

        ctx.drawImage(watermarkImg, x, y, wmWidth, wmHeight);

        const dataURL = canvas.toDataURL('image/jpeg', 0.9);
        displayResult(dataURL, file.name, wmOutput);
      };
    };

    reader.readAsDataURL(file);
  });
}

// ===== UI =====
function displayResult(dataURL, filename, target) {
  const container = document.createElement('div');
  container.className = 'image-item';

  const wrapper = document.createElement('div');
  wrapper.className = 'image-wrapper';

  const img = document.createElement('img');
  img.src = dataURL;

  const btn = document.createElement('button');
  btn.className = 'download-btn';
  btn.textContent = '↓';

  btn.onclick = function() {
    const link = document.createElement('a');
    link.href = dataURL;
    const newName = filename.replace(/\.[^/.]+$/, "") + ".jpg";
    link.download = newName;
    link.click();
  };

  const name = document.createElement('div');
  name.className = 'filename';
  name.textContent = filename;

  wrapper.appendChild(img);
  wrapper.appendChild(btn);

  container.appendChild(wrapper);
  container.appendChild(name);

  target.appendChild(container);
}
</script>

</body>
</html>
