
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Batch Tool Pro</title>

<script src="https://cdn.jsdelivr.net/npm/piexifjs"></script>

<style>
body{
  font-family:Arial;
  padding:20px;
  background:#f5f5f5;
}

h2{
  margin-bottom:30px;
}

h3{
  margin-top:40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:20px;
  margin-top:15px;
}

.image-item{
  background:#fff;
  border-radius:10px;
  padding:10px;
  border:1px solid #ddd;
}

.image-wrapper{
  position:relative;
}

img{
  width:100%;
  display:block;
  border-radius:8px;
}

.filename{
  margin-top:8px;
  font-size:12px;
  word-break:break-all;
}

.download-btn{
  position:absolute;
  top:8px;
  right:8px;
  background:rgba(0,0,0,.9);
  color:#fff;
  border:none;
  padding:8px 10px;
  border-radius:5px;
  cursor:pointer;
  font-size:12px;
}

.download-btn.downloaded{
  background:#d0d0d0;
  color:#555;
}
</style>
</head>

<body>

<h2>Batch Tool Pro</h2>

<h3>Crop Tool</h3>
<input type="file" id="cropInput" multiple accept="image/*">
<div id="cropOutput" class="grid"></div>

<h3>Watermark Tool</h3>
<input type="file" id="wmInput" multiple accept="image/*">
<div id="wmOutput" class="grid"></div>

<h3>Crop Bottom 15%</h3>
<input type="file" id="cropBottomInput" multiple accept="image/*">
<div id="cropBottomOutput" class="grid"></div>

<script>

// ==========================
// WATERMARK
// ==========================

const watermarkSrc =
"https://raw.githubusercontent.com/contactluva/bathroom/refs/heads/main/899.png";

let watermarkImg = null;

const wm = new Image();
wm.crossOrigin = "anonymous";
wm.src = watermarkSrc;

wm.onload = () => {
  watermarkImg = wm;
};

// ==========================
// INPUTS
// ==========================

const cropInput = document.getElementById('cropInput');
const wmInput = document.getElementById('wmInput');
const cropBottomInput = document.getElementById('cropBottomInput');

const cropOutput = document.getElementById('cropOutput');
const wmOutput = document.getElementById('wmOutput');
const cropBottomOutput = document.getElementById('cropBottomOutput');

// ==========================
// EVENTS
// ==========================

cropInput.onchange = e => {
  cropOutput.innerHTML = '';
  handleCrop(e.target.files);
};

wmInput.onchange = e => {
  wmOutput.innerHTML = '';
  handleWatermark(e.target.files);
};

cropBottomInput.onchange = e => {
  cropBottomOutput.innerHTML = '';
  handleCropBottom(e.target.files);
};

// ==========================
// EFFECTS
// ==========================

function applyEffects(canvas, ctx, w, h){

  const b = 1 + (Math.random() - 0.5) * 0.08;
  const c = 1 + (Math.random() - 0.5) * 0.08;
  const s = 1 + (Math.random() - 0.5) * 0.08;

  ctx.filter = `
    brightness(${b})
    contrast(${c})
    saturate(${s})
  `;

  const temp = document.createElement('canvas');

  temp.width = w;
  temp.height = h;

  const tctx = temp.getContext('2d');

  tctx.drawImage(canvas,0,0);

  ctx.clearRect(0,0,w,h);

  ctx.drawImage(temp,0,0);

  ctx.filter = 'none';

  addNoise(ctx,w,h);

  subtleWarp(ctx,w,h);

  embedInvisibleMark(ctx,w,h);
}

// ==========================
// NOISE
// ==========================

function addNoise(ctx,w,h){

  const imgData = ctx.getImageData(0,0,w,h);

  const data = imgData.data;

  for(let i=0;i<data.length;i+=4){

    const n = (Math.random() - 0.5) * 6;

    data[i]+=n;
    data[i+1]+=n;
    data[i+2]+=n;
  }

  ctx.putImageData(imgData,0,0);
}

// ==========================
// INVISIBLE MARK
// ==========================

function embedInvisibleMark(ctx,w,h){

  const imgData = ctx.getImageData(0,0,w,h);

  const data = imgData.data;

  const signature = "IPHONE14PM";

  for(let i=0;i<signature.length;i++){

    const code = signature.charCodeAt(i);

    const pixelIndex = (i * 97) % (w * h);

    const idx = pixelIndex * 4;

    data[idx+2] =
      (data[idx+2] & 0xFE) | (code & 1);
  }

  ctx.putImageData(imgData,0,0);
}

// ==========================
// WARP
// ==========================

function subtleWarp(ctx,w,h){

  w = Math.floor(w);
  h = Math.floor(h);

  const src = ctx.getImageData(0,0,w,h);

  const dst = ctx.createImageData(w,h);

  const srcData = src.data;
  const dstData = dst.data;

  const points = [];

  const count = 2 + Math.floor(Math.random() * 3);

  for(let i=0;i<count;i++){

    points.push({
      x:Math.random() * w,
      y:Math.random() * h,
      radius:150 + Math.random() * 50,
      strength:(Math.random() - 0.5) * 5
    });
  }

  for(let y=0;y<h;y++){

    for(let x=0;x<w;x++){

      let dx = 0;
      let dy = 0;

      for(let p of points){

        const distX = x - p.x;
        const distY = y - p.y;

        const dist =
          Math.sqrt(distX * distX + distY * distY);

        if(dist < p.radius){

          const power = 1 - dist / p.radius;

          dx += distX * power * p.strength * 0.05;

          dy += distY * power * p.strength * 0.05;
        }
      }

      const sx = Math.max(
        0,
        Math.min(w-1,Math.round(x+dx))
      );

      const sy = Math.max(
        0,
        Math.min(h-1,Math.round(y+dy))
      );

      const si = (sy*w+sx)*4;
      const di = (y*w+x)*4;

      dstData[di] = srcData[si];
      dstData[di+1] = srcData[si+1];
      dstData[di+2] = srcData[si+2];
      dstData[di+3] = srcData[si+3];
    }
  }

  ctx.putImageData(dst,0,0);
}

// ==========================
// HASH
// ==========================

async function sha256(message){

  const msgBuffer =
    new TextEncoder().encode(message);

  const hashBuffer =
    await crypto.subtle.digest('SHA-256',msgBuffer);

  const hashArray =
    Array.from(new Uint8Array(hashBuffer));

  return hashArray
    .map(b=>b.toString(16).padStart(2,'0'))
    .join('');
}

// ==========================
// EXPORT WITH FAKE IPHONE 14
// ==========================

async function exportImage(
  canvas,
  filename,
  target
){

  canvas.toBlob(async blob=>{

    const reader = new FileReader();

    reader.onload = async function(){

      let jpegData = reader.result;

      const zeroth = {};
      const exif = {};
      const gps = {};

      const hash =
        await sha256(filename + Date.now());

      // ==========================
      // FAKE IPHONE 14 EXIF
      // ==========================

      zeroth[piexif.ImageIFD.Make] = "Apple";

      zeroth[piexif.ImageIFD.Model] =
        "iPhone 14 Pro Max";

      zeroth[piexif.ImageIFD.Software] =
        "17.5.1";

      zeroth[piexif.ImageIFD.Artist] =
        "Apple iPhone";

      zeroth[piexif.ImageIFD.ImageDescription] =
        "DCIM/100APPLE asset:" + hash;

      exif[piexif.ExifIFD.DateTimeOriginal] =
        new Date()
        .toISOString()
        .replace('T',' ')
        .substring(0,19);

      exif[piexif.ExifIFD.LensMake] =
        "Apple";

      exif[piexif.ExifIFD.LensModel] =
        "iPhone 14 Pro Max back triple camera 6.86mm f/1.78";

      exif[piexif.ExifIFD.FNumber] =
        [178,100];

      exif[piexif.ExifIFD.ISOSpeedRatings] =
        32 + Math.floor(Math.random()*80);

      exif[piexif.ExifIFD.FocalLength] =
        [686,100];

      exif[piexif.ExifIFD.ExposureTime] =
        [1,120];

      const exifObj = {
        "0th":zeroth,
        "Exif":exif,
        "GPS":gps
      };

      const exifBytes =
        piexif.dump(exifObj);

      jpegData =
        piexif.insert(exifBytes,jpegData);

      const finalBlob =
        dataURLtoBlob(jpegData);

      const url =
        URL.createObjectURL(finalBlob);

      displayResult(url,filename,target);
    };

    reader.readAsDataURL(blob);

  },
  'image/jpeg',
  0.90 + Math.random() * 0.05);
}

// ==========================
// DATAURL → BLOB
// ==========================

function dataURLtoBlob(dataURL){

  const arr = dataURL.split(',');

  const mime =
    arr[0].match(/:(.*?);/)[1];

  const bstr = atob(arr[1]);

  let n = bstr.length;

  const u8arr = new Uint8Array(n);

  while(n--){
    u8arr[n] = bstr.charCodeAt(n);
  }

  return new Blob(
    [u8arr],
    {type:mime}
  );
}

// ==========================
// CROP
// ==========================

function handleCrop(files){

  Array.from(files).forEach(file=>{

    const reader = new FileReader();

    reader.onload = e => {

      const img = new Image();

      img.src = e.target.result;

      img.onload = ()=>{

        const canvas =
          document.createElement('canvas');

        const ctx =
          canvas.getContext('2d');

        const cropScale = 0.91;

        const cropW =
          Math.floor(img.width * cropScale);

        const cropH =
          Math.floor(img.height * cropScale);

        const sx =
          Math.floor((img.width-cropW)/2);

        const sy =
          Math.floor((img.height-cropH)/2);

        canvas.width = cropW;
        canvas.height = cropH;

        ctx.drawImage(
          img,
          sx,
          sy,
          cropW,
          cropH,
          0,
          0,
          cropW,
          cropH
        );

        applyEffects(
          canvas,
          ctx,
          cropW,
          cropH
        );

        exportImage(
          canvas,
          file.name,
          cropOutput
        );
      };
    };

    reader.readAsDataURL(file);
  });
}

// ==========================
// WATERMARK
// ==========================

function handleWatermark(files){

  Array.from(files).forEach(file=>{

    const reader = new FileReader();

    reader.onload = e => {

      const img = new Image();

      img.src = e.target.result;

      img.onload = ()=>{

        if(!watermarkImg) return;

        const canvas =
          document.createElement('canvas');

        const ctx =
          canvas.getContext('2d');

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img,0,0);

        const wmWidth = 59;

        const scale =
          wmWidth / watermarkImg.width;

        const wmHeight =
          watermarkImg.height * scale;

        const x =
          canvas.width - wmWidth - 14;

        const y =
          canvas.height - wmHeight + 2;

        ctx.drawImage(
          watermarkImg,
          x,
          y,
          wmWidth,
          wmHeight
        );

        applyEffects(
          canvas,
          ctx,
          canvas.width,
          canvas.height
        );

        exportImage(
          canvas,
          file.name,
          wmOutput
        );
      };
    };

    reader.readAsDataURL(file);
  });
}

// ==========================
// CROP BOTTOM
// ==========================

function handleCropBottom(files){

  Array.from(files).forEach(file=>{

    const reader = new FileReader();

    reader.onload = e => {

      const img = new Image();

      img.src = e.target.result;

      img.onload = ()=>{

        const canvas =
          document.createElement('canvas');

        const ctx =
          canvas.getContext('2d');

        const newH =
          img.height * 0.85;

        canvas.width = img.width;
        canvas.height = newH;

        ctx.drawImage(
          img,
          0,
          0,
          img.width,
          newH,
          0,
          0,
          img.width,
          newH
        );

        applyEffects(
          canvas,
          ctx,
          canvas.width,
          canvas.height
        );

        exportImage(
          canvas,
          file.name,
          cropBottomOutput
        );
      };
    };

    reader.readAsDataURL(file);
  });
}

// ==========================
// UI
// ==========================

function displayResult(
  url,
  filename,
  target
){

  const container =
    document.createElement('div');

  container.className = 'image-item';

  const wrapper =
    document.createElement('div');

  wrapper.className = 'image-wrapper';

  const img =
    document.createElement('img');

  img.src = url;

  const btn =
    document.createElement('button');

  btn.className = 'download-btn';

  btn.textContent = '↓';

  btn.onclick = ()=>{

    const link =
      document.createElement('a');

    link.href = url;

    link.download =
      filename.replace(/\.[^/.]+$/,"")
      + ".jpg";

    link.click();

    btn.classList.add('downloaded');

    btn.textContent = '✓';
  };

  const name =
    document.createElement('div');

  name.className = 'filename';

  name.textContent = filename;

  wrapper.appendChild(img);
  wrapper.appendChild(btn);

  container.appendChild(wrapper);
  container.appendChild(name);

  target.appendChild(container);
}

</script>

</body>
</html>
