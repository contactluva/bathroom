<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Batch Image Crop & Convert</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    /* GRID 3 CỘT */
    #output {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 20px;
    }

    .image-item {
      position: relative;
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 8px;
      background: #fafafa;
    }

    .image-wrapper {
      position: relative;
    }

    img {
      width: 100%;
      display: block;
      border-radius: 6px;
    }

    /* NÚT DOWNLOAD GÓC TRÊN PHẢI */
    .download-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 14px 18px;
      font-size: 12px;
      background: rgba(0,0,0,0.9);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .filename {
      margin-top: 8px;
      font-size: 13px;
      word-break: break-all;
    }
  </style>
</head>
<body>

<h2>Import & Crop ảnh hàng loạt</h2>

<input type="file" id="fileInput" multiple accept="image/*">

<div id="output"></div>

<script>
const input = document.getElementById('fileInput');
const output = document.getElementById('output');

input.addEventListener('change', handleFiles);

function handleFiles(event) {
  const files = event.target.files;
  output.innerHTML = '';

  Array.from(files).forEach(file => {
    const reader = new FileReader();

    reader.onload = function(e) {
      const img = new Image();
      img.src = e.target.result;

      img.onload = function() {
        processImage(img, file.name);
      };
    };

    reader.readAsDataURL(file);
  });
}

function processImage(img, filename) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  const width = img.width;
  const height = img.height;

  const newWidth = width * 0.91;
  const newHeight = height * 0.91;

  canvas.width = newWidth;
  canvas.height = newHeight;

  ctx.drawImage(
    img,
    0, 0, newWidth, newHeight,
    0, 0, newWidth, newHeight
  );

  const dataURL = canvas.toDataURL('image/jpeg', 0.9);

  displayResult(dataURL, filename);
}

function displayResult(dataURL, filename) {
  const container = document.createElement('div');
  container.className = 'image-item';

  const wrapper = document.createElement('div');
  wrapper.className = 'image-wrapper';

  const img = document.createElement('img');
  img.src = dataURL;

  const btn = document.createElement('button');
  btn.className = 'download-btn';
  btn.textContent = '↓';

  btn.onclick = function() {
    const link = document.createElement('a');
    link.href = dataURL;
    const newName = filename.replace(/\.[^/.]+$/, "") + ".jpg";
    link.download = newName;
    link.click();
  };

  const name = document.createElement('div');
  name.className = 'filename';
  name.textContent = filename;

  wrapper.appendChild(img);
  wrapper.appendChild(btn);

  container.appendChild(wrapper);
  container.appendChild(name);

  output.appendChild(container);
}
</script>

</body>
</html>
