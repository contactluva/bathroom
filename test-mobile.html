<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tester - Phone Landscape Simulator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            background-color: #1e1e1e;
            color: #ffffff;
            overflow: hidden;
        }

        /* Bên trái chiếm 1/3 */
        .left-panel {
            width: 33.33%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-right: 2px solid #333;
            background-color: #252526;
        }

        /* Bên phải chiếm 2/3 */
        .right-panel {
            width: 66.67%;
            display: flex;
            flex-direction: column;
            background-color: #1e1e1e;
            position: relative;
        }

        h2 {
            font-size: 18px;
            color: #d4d4d4;
        }

        /* --- THANH CÔNG CỤ --- */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            margin-top: 15px;
        }

        .toolbar input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #1e1e1e;
            color: white;
            outline: none;
        }

        .toolbar input:focus {
            border-color: #007acc;
        }

        .toolbar button {
            padding: 10px 15px;
            font-size: 14px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .toolbar button:hover {
            background-color: #45a049;
        }
        
        .header-right {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 20px 0;
        }

        #fullWidthBtn {
            padding: 10px 20px;
            font-size: 14px;
            background-color: #f39c12;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #fullWidthBtn:hover {
            background-color: #e67e22;
        }

        /* Khu vực nhập code */
        textarea {
            flex: 1;
            width: 100%;
            resize: none;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            background-color: #1e1e1e;
            color: #d4d4d4;
            border: 1px solid #444;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
            line-height: 1.5;
        }

        textarea:focus {
            border-color: #007acc;
        }

        /* Nút submit */
        #submitBtn {
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #submitBtn:hover {
            background-color: #005f9e;
        }

        /* Khu vực chứa điện thoại */
        .phone-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px 0;
            width: 100%;
        }

        /* Kích thước CSS (Logical) giả lập điện thoại thực */
        .phone-mockup {
            width: 884px;
            aspect-ratio: 16 / 9;
            background: #ffffff;
            border: 12px solid #000000;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            transform-origin: center center;
            flex-shrink: 0;
        }

        /* Notch / Camera giả lập */
        .phone-mockup::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 15px;
            height: 80px;
            background: #000;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            z-index: 10;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 28px;
            background-color: #ffffff;
        }

        /* --- CHẾ ĐỘ FULL WIDTH --- */
        body.fullscreen-mode .left-panel {
            display: none;
        }

        body.fullscreen-mode .right-panel {
            width: 100%;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            background-color: #000; 
        }

        body.fullscreen-mode .header-right {
            display: none;
        }

        body.fullscreen-mode .phone-wrapper {
            padding: 0;
        }

        body.fullscreen-mode .phone-mockup {
            border: none;
            border-radius: 0;
            box-shadow: none;
            transform: none !important; 
            width: 100vw;
            height: calc(100vw * 9 / 16);
            max-height: 100vh;
            max-width: calc(100vh * 16 / 9);
        }

        body.fullscreen-mode .phone-mockup::before {
            display: none;
        }

        body.fullscreen-mode iframe {
            border-radius: 0;
        }

        #exitFullWidthBtn {
            display: none;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            border-radius: 30px;
            z-index: 1010;
            backdrop-filter: blur(5px);
            cursor: pointer;
        }

        #exitFullWidthBtn:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        body.fullscreen-mode #exitFullWidthBtn {
            display: block;
        }
    </style>
</head>
<body>

    <div class="left-panel">
        <h2>HTML / CSS / JS Code</h2>
        
        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="Tìm kiếm trong code (Enter)...">
            <button id="searchBtn">Tìm</button>
            <button id="downloadBtn" title="Tải xuống thành file index.html">Tải Code</button>
        </div>

        <textarea id="htmlInput"><!DOCTYPE html>
<html lang="vi">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
      background-color: #f0f0f0; 
      font-family: sans-serif;
    }
    .box {
      text-align: center;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h1 { 
      font-size: 28px;
      color: #333; 
      margin-bottom: 10px;
    }
    p {
      font-size: 16px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Hello World!</h1>
    <p>Màn hình đã scale chuẩn mobile.</p>
  </div>
</body>
</html></textarea>
        <button id="submitBtn">Chạy Code (Submit)</button>
    </div>

    <div class="right-panel">
        <div class="header-right">
            <h2>Hiển thị (Logical Resolution 884x406 - Scale 96%)</h2>
            <button id="fullWidthBtn">Full Width</button>
        </div>
        <div class="phone-wrapper" id="phoneWrapper">
            <div class="phone-mockup" id="phoneMockup">
                <iframe id="outputFrame"></iframe>
            </div>
        </div>
        <button id="exitFullWidthBtn">Thoát mở rộng</button>
    </div>

    <script>
        const submitBtn = document.getElementById('submitBtn');
        const htmlInput = document.getElementById('htmlInput');
        const outputFrame = document.getElementById('outputFrame');
        const phoneWrapper = document.getElementById('phoneWrapper');
        const phoneMockup = document.getElementById('phoneMockup');

        function renderCode() {
            const code = htmlInput.value;
            outputFrame.srcdoc = code;
        }
        submitBtn.addEventListener('click', renderCode);

        // --- TÍNH NĂNG TÌM KIẾM CÓ TỰ ĐỘNG CUỘN ---
        let lastSearchIndex = 0;

        function performSearch() {
            const term = document.getElementById('searchInput').value;
            if (!term) return;
            
            const text = htmlInput.value;
            let index = text.indexOf(term, lastSearchIndex);
            
            // Nếu không tìm thấy ở đoạn tiếp theo, vòng lại tìm từ đầu
            if (index === -1) {
                lastSearchIndex = 0;
                index = text.indexOf(term, lastSearchIndex);
            }
            
            if (index !== -1) {
                // Focus và bôi đen chữ
                htmlInput.focus();
                htmlInput.setSelectionRange(index, index + term.length);
                lastSearchIndex = index + term.length;
                
                // === LOGIC TỰ ĐỘNG CUỘN (AUTO-SCROLL) ===
                // Lấy đoạn text từ đầu đến vị trí tìm thấy
                const textUpToIndex = text.substring(0, index);
                // Đếm số lần xuống dòng (\n) để biết chữ đang ở dòng thứ mấy
                const lineCount = textUpToIndex.split('\n').length;
                
                // Tính toán: font 14px * line-height 1.5 = 21px mỗi dòng
                const lineHeight = 21; 
                // Trừ đi khoảng 4 dòng để kết quả hiển thị ở giữa khung thay vì dính sát mép trên
                htmlInput.scrollTop = (lineCount - 4) * lineHeight;

            } else {
                alert('Không tìm thấy: "' + term + '"');
            }
        }

        // Bấm nút Tìm
        document.getElementById('searchBtn').addEventListener('click', performSearch);
        
        // Hỗ trợ bấm phím Enter trong ô tìm kiếm
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // Reset index khi người dùng gõ từ khóa mới
        document.getElementById('searchInput').addEventListener('input', () => lastSearchIndex = 0);

        // --- TÍNH NĂNG TẢI FILE HTML ---
        document.getElementById('downloadBtn').addEventListener('click', function() {
            const code = htmlInput.value;
            const blob = new Blob([code], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'index.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // --- TÍNH NĂNG FULL WIDTH ---
        const fullWidthBtn = document.getElementById('fullWidthBtn');
        const exitFullWidthBtn = document.getElementById('exitFullWidthBtn');

        fullWidthBtn.addEventListener('click', function() {
            document.body.classList.add('fullscreen-mode');
            phoneMockup.style.transform = 'none'; 
        });

        exitFullWidthBtn.addEventListener('click', function() {
            document.body.classList.remove('fullscreen-mode');
            scalePhone(); 
        });

        // Hàm scale để điện thoại chiếm đúng 96% chiều ngang
        function scalePhone() {
            if (document.body.classList.contains('fullscreen-mode')) {
                phoneMockup.style.transform = 'none';
                return;
            }

            const mockupWidth = 884; 
            const wrapperWidth = phoneWrapper.clientWidth;
            const targetWidth = wrapperWidth * 0.96;
            const scale = targetWidth / mockupWidth;
            
            phoneMockup.style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', scalePhone);
        scalePhone();
        renderCode();
    </script>
</body>
</html>
