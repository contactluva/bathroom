<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tester - Phone Landscape Simulator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            background-color: #1e1e1e;
            color: #ffffff;
            overflow: hidden;
        }

        /* Bên trái chiếm 1/3 */
        .left-panel {
            width: 33.33%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-right: 2px solid #333;
            background-color: #252526;
        }

        /* Bên phải chiếm 2/3 */
        .right-panel {
            width: 66.67%;
            display: flex;
            flex-direction: column;
            background-color: #1e1e1e;
            position: relative;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #d4d4d4;
        }

        /* Khu vực nhập code */
        textarea {
            flex: 1;
            width: 100%;
            resize: none;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            background-color: #1e1e1e;
            color: #d4d4d4;
            border: 1px solid #444;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
            line-height: 1.5;
        }

        textarea:focus {
            border-color: #007acc;
        }

        /* Nút submit */
        button {
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #005f9e;
        }

        /* Khu vực chứa điện thoại */
        .phone-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px 0;
            width: 100%;
        }

        /* Kích thước CSS (Logical) giả lập điện thoại thực: 884 x 406 pixel */
        .phone-mockup {
            width: 884px;
            height: 406px;
            background: #ffffff;
            border: 12px solid #000000;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            transform-origin: center center;
            flex-shrink: 0;
        }

        /* Notch / Camera giả lập */
        .phone-mockup::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 15px;
            height: 80px;
            background: #000;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            z-index: 10;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 28px; /* Cập nhật lại góc bo iframe cho khớp viền */
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="left-panel">
        <h2>HTML / CSS / JS Code</h2>
        <textarea id="htmlInput"><!DOCTYPE html>
<html lang="vi">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
      background-color: #f0f0f0; 
      font-family: sans-serif;
    }
    .box {
      text-align: center;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h1 { 
      font-size: 28px; /* Chữ 28px trên thiết bị di động sẽ to và rõ ràng */
      color: #333; 
      margin-bottom: 10px;
    }
    p {
      font-size: 16px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Hello World!</h1>
    <p>Màn hình đã scale chuẩn mobile.</p>
  </div>
</body>
</html></textarea>
        <button id="submitBtn">Chạy Code (Submit)</button>
    </div>

    <div class="right-panel">
        <h2 style="padding: 20px 20px 0;">Hiển thị (Logical Resolution 884x406 - Scale 96% chiều ngang)</h2>
        <div class="phone-wrapper" id="phoneWrapper">
            <div class="phone-mockup" id="phoneMockup">
                <iframe id="outputFrame"></iframe>
            </div>
        </div>
    </div>

    <script>
        const submitBtn = document.getElementById('submitBtn');
        const htmlInput = document.getElementById('htmlInput');
        const outputFrame = document.getElementById('outputFrame');
        const phoneWrapper = document.getElementById('phoneWrapper');
        const phoneMockup = document.getElementById('phoneMockup');

        // Hàm load code vào iframe
        function renderCode() {
            const code = htmlInput.value;
            const doc = outputFrame.contentDocument || outputFrame.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();
        }

        submitBtn.addEventListener('click', renderCode);

        // Hàm scale để điện thoại chiếm đúng 96% chiều ngang của phần bên phải
        function scalePhone() {
            // Chiều rộng LÝ THUYẾT (CSS pixels) của thiết bị
            const mockupWidth = 884; 
            
            // Chiều rộng của khu vực bên phải (wrapper)
            const wrapperWidth = phoneWrapper.clientWidth;
            
            // Tính toán tỷ lệ sao cho mockupWidth * scale = wrapperWidth * 0.96
            const targetWidth = wrapperWidth * 0.96;
            const scale = targetWidth / mockupWidth;
            
            // Áp dụng scale
            phoneMockup.style.transform = `scale(${scale})`;
        }

        // Cập nhật khi thay đổi kích thước cửa sổ
        window.addEventListener('resize', scalePhone);

        // Khởi tạo lần đầu
        scalePhone();
        
        // Render luôn đoạn code mặc định lúc mới mở trang
        renderCode();
    </script>
</body>
</html>
